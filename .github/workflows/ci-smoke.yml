name: CI Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate dependency resolution
        run: |
          python -m pip install --upgrade pip
          python -m pip install --dry-run -r requirements.txt

      - name: Syntax smoke test
        run: |
          python -m compileall -q app.py src services routers benchmarks
